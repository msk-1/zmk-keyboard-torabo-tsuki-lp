# バッテリー残量をLEDの点滅回数(1〜5回)で表示するビヘイビア

description: Battery level LED indicator behavior (blinks 1-5 times)

compatible: "zmk,behavior-battery-led"

include: zero_param.yaml

properties:
  led:
    type: phandle
    required: true
    description: LED node (gpio-leds child) to blink
  blink-ms:
    type: int
    default: 150
    description: LED on duration per blink in milliseconds
  pause-ms:
    type: int
    default: 250
    description: LED off duration between blinks in milliseconds
  peripheral-trigger-position:
    type: int
    description: >
      Key position that triggers the battery indication locally on the
      peripheral half, without relying on the split connection
      (matrix transform position of the active physical layout)
